name: Auto-tag on merge\n\n# Runs whenever a PR targeting main is closed.\n# Only proceeds when the PR was actually merged (not just closed).\non:\n  pull_request:\n    types: [closed]\n    branches: [main]\n\npermissions:\n  contents: write\n\njobs:\n  tag:\n    name: Bump SemVer tag\n    if: github.event.pull_request.merged == true\n    runs-on: ubuntu-latest\n\n    steps:\n      - uses: actions/checkout@v4\n        with:\n          fetch-depth: 0   # full history so all tags are available\n          fetch-tags: true\n\n      # ── Determine bump type from PR labels ──────────────────────────────────\n      # Label \"bump:major\" → major  (1.2.3 → 2.0.0)\n      # Label \"bump:minor\" → minor  (1.2.3 → 1.3.0)\n      # No label (default) → patch  (1.2.3 → 1.2.4)\n      - name: Determine bump type\n        id: bump\n        env:\n          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}\n        run: |\n          if echo \"$LABELS\" | grep -q 'bump:major'; then\n            echo \"type=major\" >> \"$GITHUB_OUTPUT\"\n          elif echo \"$LABELS\" | grep -q 'bump:minor'; then\n            echo \"type=minor\" >> \"$GITHUB_OUTPUT\"\n          else\n            echo \"type=patch\" >> \"$GITHUB_OUTPUT\"\n          fi\n\n      # ── Find latest tag and compute the next one ────────────────────────────\n      - name: Compute next version\n        id: version\n        run: |\n          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \\\n                   --sort=-version:refname | head -1)\n          [ -z \"$LATEST\" ] && LATEST=\"v0.0.0\"\n          echo \"Latest tag: $LATEST\"\n\n          VER=\"${LATEST#v}\"\n          MAJOR=$(echo \"$VER\" | cut -d. -f1)\n          MINOR=$(echo \"$VER\" | cut -d. -f2)\n          PATCH=$(echo \"$VER\" | cut -d. -f3)\n\n          case \"${{ steps.bump.outputs.type }}\" in\n            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;\n            minor) MINOR=$((MINOR+1)); PATCH=0 ;;\n            *)     PATCH=$((PATCH+1)) ;;\n          esac\n\n          NEW=\"v${MAJOR}.${MINOR}.${PATCH}\"\n          echo \"Next tag: $NEW\"\n          echo \"value=$NEW\" >> \"$GITHUB_OUTPUT\"\n\n      # ── Create and push the tag (triggers release.yml automatically) ────────\n      - name: Create and push tag\n        run: |\n          git config user.name  \"github-actions[bot]\"\n          git config user.email \"github-actions[bot]@users.noreply.github.com\"\n          git tag \"${{ steps.version.outputs.value }}\" \\\n            -m \"Release ${{ steps.version.outputs.value }} — PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}\"\n          git push origin \"${{ steps.version.outputs.value }}\"\n