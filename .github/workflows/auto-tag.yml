name: Auto-tag on merge

# Runs whenever a PR targeting main is closed.
# Only proceeds when the PR was actually merged (not just closed).
on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  tag:
    name: Bump SemVer tag
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      # bump:major -> X+1.0.0 | bump:minor -> x.Y+1.0 | default -> x.y.Z+1
      - name: Determine bump type
        id: bump
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q 'bump:major'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$LABELS" | grep -q 'bump:minor'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      # If no tag exists yet, baseline is v0.9.9 so first patch bump -> v1.0.0
      - name: Compute next version
        id: version
        run: |
          LATEST=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
                   --sort=-version:refname | head -1)
          [ -z "$LATEST" ] && LATEST="v0.9.9"
          echo "Latest tag: $LATEST"

          VER="${LATEST#v}"
          MAJOR=$(echo "$VER" | cut -d. -f1)
          MINOR=$(echo "$VER" | cut -d. -f2)
          PATCH=$(echo "$VER" | cut -d. -f3)

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            *)     PATCH=$((PATCH+1)) ;;
          esac

          NEW="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Next tag: $NEW"
          echo "value=$NEW" >> "$GITHUB_OUTPUT"

      # Push tag -> triggers release.yml automatically
      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.value }}" \
            -m "Release ${{ steps.version.outputs.value }} - PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
          git push origin "${{ steps.version.outputs.value }}"
