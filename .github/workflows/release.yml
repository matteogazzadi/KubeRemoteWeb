name: Release

on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    name: Build & release (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build_cmd:    npm run build:win
            artifact_glob: dist/*.exe
            kubectl_os:   windows
            kubectl_arch: amd64
            kubectl_name: kubectl.exe

          - os: macos-latest
            build_cmd:    npm run build:mac
            artifact_glob: dist/*.dmg
            kubectl_os:   darwin
            kubectl_arch: arm64
            kubectl_name: kubectl

          - os: ubuntu-latest
            build_cmd:    npm run build:linux
            artifact_glob: dist/*.AppImage
            kubectl_os:   linux
            kubectl_arch: amd64
            kubectl_name: kubectl

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm test

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libgtk-3-dev libnotify-dev libnss3 libxss1 libxtst6 xauth xvfb

      - name: Download kubectl binary
        shell: bash
        run: |
          KUBECTL_VERSION=$(curl -sL https://dl.k8s.io/release/stable.txt)
          mkdir -p bin
          curl -sL "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/${{ matrix.kubectl_os }}/${{ matrix.kubectl_arch }}/${{ matrix.kubectl_name }}" \
            -o "bin/${{ matrix.kubectl_name }}"
          if [ "${{ matrix.kubectl_os }}" != "windows" ]; then
            chmod +x "bin/${{ matrix.kubectl_name }}"
          fi

      - name: Build distributable
        run: ${{ matrix.build_cmd }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EP_DRAFT: false
          ELECTRON_BUILDER_PUBLISH: never

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.value }}
          files: ${{ matrix.artifact_glob }}
          generate_release_notes: true
          draft: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
